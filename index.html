<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V7 + Ajout produit</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f3}
.header{background:#1f2937;color:#fff;padding:15px}
.card{background:#fff;margin:10px;padding:15px;border-radius:12px}
input{width:80px;font-size:18px;text-align:center}
button{padding:8px;margin:5px;border-radius:6px;border:none;background:#2563eb;color:#fff}
.add{background:#16a34a}
</style>
</head>
<body>

<div class="header">Suivi chantier V7 + Ajout produit</div>
<div id="app"></div>

<script>
let template = JSON.parse(localStorage.getItem("template_v7")||`{
"Ilot 1":[["Gouttière",71],["Descentes",30]],
"Ilot 2":[["Gouttière",150]]
}`);

let db=JSON.parse(localStorage.getItem("data_v7")||"{}");

function saveAll(){
 localStorage.setItem("template_v7",JSON.stringify(template));
 localStorage.setItem("data_v7",JSON.stringify(db));
}

function render(){
 let html="<div class='card'><b>Projet F&P</b><br><br>";
 Object.keys(template).forEach(ilot=>{
  html+="<b>"+ilot+"</b><br>";

  template[ilot].forEach((p,i)=>{
    let key=ilot+"_"+i;
    let total=p[1];
    let pose=Number(db[key]||0);
    let reste=total-pose;

    html+=`
    ${p[0]} prévu ${total}<br>
    posé <input value="${pose}" onchange="update('${key}',this.value,${total})">
    reste <b id="r_${key}">${reste}</b><br><br>`;
  });

  html+=`<button class="add" onclick="addProduct('${ilot}')">+ Ajouter produit</button><hr>`;
 });

 html+="</div>";
 document.getElementById("app").innerHTML=html;
}

function update(key,val,total){
 let v=Number(val||0);
 if(v<0)v=0;
 if(v>total)v=total;
 db[key]=v;
 saveAll();
 document.getElementById("r_"+key).innerText=total-v;
}

function addProduct(ilot){
 let name=prompt("Nom du produit ?");
 if(!name)return;
 let qty=prompt("Quantité prévue ?");
 qty=Number(qty||0);
 if(!qty)return;

 template[ilot].push([name,qty]);
 saveAll();
 render();
}

render();
</script>

</body>
</html>
