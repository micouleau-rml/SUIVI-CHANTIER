<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suivi Chantier V7 PRO SIMPLE</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f3}
.header{background:#1f2937;color:#fff;padding:15px}
.card{background:#fff;margin:10px;padding:15px;border-radius:12px}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#2563eb;color:white}
input{width:60px;text-align:center}
</style>
</head>
<body>

<div class="header">Suivi Chantier</div>

<div class="card">
<button onclick="addIlot()">+ Ajouter un îlot</button>
</div>

<div id="app"></div>

<script>
var KEY="chantier_v7";

function load(){
 var db=localStorage.getItem(KEY);
 if(!db){
  db={ilots:[
    {nom:"Ilot 1",produits:[
      {nom:"Gouttière",total:71,pose:0},
      {nom:"Descentes",total:30,pose:0}
    ]}
  ]};
  localStorage.setItem(KEY,JSON.stringify(db));
  return db;
 }
 return JSON.parse(db);
}

function save(db){
 localStorage.setItem(KEY,JSON.stringify(db));
}

function render(){
 var db=load();
 var html="";
 db.ilots.forEach(function(ilot,i){
  html+="<div class='card'><b>"+ilot.nom+"</b><br><br>";

  ilot.produits.forEach(function(p,j){
    var reste=p.total-p.pose;
    html+=p.nom+" prévu "+p.total+"<br>";
    html+="posé <input value='"+p.pose+"' onchange='update("+i+","+j+",this.value)'> ";
    html+="reste <b>"+reste+"</b><br><br>";
  });

  html+="</div>";
 });

 document.getElementById("app").innerHTML=html;
}

function update(i,j,val){
 var db=load();
 db.ilots[i].produits[j].pose=Number(val||0);
 save(db);
 render();
}

function addIlot(){
 var db=load();
 var n=db.ilots.length+1;
 db.ilots.push({
  nom:"Ilot "+n,
  produits:[
    {nom:"Gouttière",total:0,pose:0},
    {nom:"Descentes",total:0,pose:0},
    {nom:"Coudes",total:0,pose:0}
  ]
 });
 save(db);
 render();
}

render();
</script>

</body>
</html>
